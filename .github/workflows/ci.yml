name: CI

on:
  push:
    branches:
      - '*'
    tags:
      - '[0-9]+.*'
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout last commit
        uses: actions/checkout@v4

      - name: Install clang-format 18
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        run: |
          wget https://apt.llvm.org/llvm-snapshot.gpg.key
          sudo gpg --dearmor < llvm-snapshot.gpg.key > /usr/share/keyrings/llvm-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/llvm-archive-keyring.gpg] http://apt.llvm.org/jammy/ llvm-toolchain-jammy-18 main" | sudo tee /etc/apt/sources.list.d/llvm-toolchain-jammy-18.list
          sudo apt-get update
          sudo apt-get install -y clang-format-18
          sudo ln -sf /usr/bin/clang-format-18 /usr/local/bin/clang-format
          clang-format --version

      - name: Code style lint
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        shell: bash
        run: |
          chmod +x clang-format.sh clang-format.ps1 2>/dev/null || true
          ./clang-format.sh -i || true

  # ── Prepare: download/build dependencies, cache them ──────────
  prepare:
    runs-on: windows-2022
    env:
      boost_version: 1.84.0
      BOOST_ROOT: ${{ github.workspace }}/deps/boost_1_84_0
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Boost
        id: cache-boost
        uses: actions/cache@v4
        with:
          path: ${{ env.BOOST_ROOT }}
          key: ${{ runner.os }}-boost-${{ env.boost_version }}

      - name: Download and build Boost
        if: steps.cache-boost.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir -p "$BOOST_ROOT"
          cd "$BOOST_ROOT/.." || exit 1
          BOOST_VER="1_84_0"
          BOOST_URL="https://archives.boost.io/release/1.84.0/source/boost_${BOOST_VER}.7z"
          curl -L -o "boost_${BOOST_VER}.7z" "$BOOST_URL"
          ./output/7z.exe x "boost_${BOOST_VER}.7z" -y
          cd "$GITHUB_WORKSPACE"
          cp env.vs2022.bat env.bat
          echo "BOOST_ROOT=$BOOST_ROOT" >> env.bat
          ./build.bat boost arm64

      - name: Cache bundled WinSparkle
        id: cache-winsparkle
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}\winsparkle\x64\Release\WinSparkle.dll
            ${{ github.workspace }}\winsparkle\x64\Release\WinSparkle.lib
            ${{ github.workspace }}\winsparkle\Release\WinSparkle.dll
            ${{ github.workspace }}\winsparkle\Release\WinSparkle.lib
          key: ${{ runner.os }}-winsparkle-v0.9.2-bundled

      - name: Build bundled WinSparkle
        if: steps.cache-winsparkle.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          if (Test-Path winsparkle) { Remove-Item -Recurse -Force winsparkle }
          git clone https://github.com/vslavik/winsparkle.git -b v0.9.2 --depth 1
          cd winsparkle
          git submodule update --init --recursive
          copy ..\bundled_winsparkle.patch .
          git apply bundled_winsparkle.patch
          nuget restore
          msbuild -m -t:Build -p:Configuration=Release -p:Platform=x64 WinSparkle.sln
          msbuild -m -t:Build -p:Configuration=Release -p:Platform=Win32 WinSparkle.sln

      - name: Get Rime files
        shell: pwsh
        run: .\get-rime.ps1 -use dev

      - name: Prepare installer resources
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path ..\rime-frost
          Set-Content -Path ..\rime-frost\essay.txt -Value "placeholder"
          Set-Content -Path ..\rime-frost\default.yaml -Value "placeholder"
          $upstream = "https://raw.githubusercontent.com/rime/weasel/master/output"
          Invoke-WebRequest -Uri "$upstream/7z.exe" -OutFile ".\output\7z.exe"
          Invoke-WebRequest -Uri "$upstream/7-zip-license.txt" -OutFile ".\output\7-zip-license.txt"
          Invoke-WebRequest -Uri "$upstream/curl.exe" -OutFile ".\output\curl.exe"
          Invoke-WebRequest -Uri "$upstream/COPYING-curl.txt" -OutFile ".\output\COPYING-curl.txt"
          "" | Out-File -FilePath ".\output\rime-install.bat" -Encoding ascii
          "" | Out-File -FilePath ".\output\rime-install-config.bat" -Encoding ascii
          "" | Out-File -FilePath ".\output\start_service.bat" -Encoding ascii
          "" | Out-File -FilePath ".\output\stop_service.bat" -Encoding ascii

  # ── Build: uses cached dependencies to build the installer ────
  build:
    needs: [lint, prepare]
    runs-on: windows-2022
    env:
      boost_version: 1.84.0
      BOOST_ROOT: ${{ github.workspace }}/deps/boost_1_84_0
      SDKVER: 10.0.19041.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Fetch all tags
        run: git fetch --tags

      - name: Configure build environment
        shell: bash
        run: |
          cp env.vs2022.bat env.bat
          echo git_ref_name="$(git describe --always)" >> $GITHUB_ENV

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore Boost cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.BOOST_ROOT }}
          key: ${{ runner.os }}-boost-${{ env.boost_version }}
          fail-on-cache-miss: true

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          sdk: ${{ env.SDKVER }}

      - name: Restore WinSparkle cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ github.workspace }}\winsparkle\x64\Release\WinSparkle.dll
            ${{ github.workspace }}\winsparkle\x64\Release\WinSparkle.lib
            ${{ github.workspace }}\winsparkle\Release\WinSparkle.dll
            ${{ github.workspace }}\winsparkle\Release\WinSparkle.lib
          key: ${{ runner.os }}-winsparkle-v0.9.2-bundled
          fail-on-cache-miss: true

      - name: Install WinSparkle files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          copy .\winsparkle\x64\Release\WinSparkle.dll .\output\
          copy .\winsparkle\x64\Release\WinSparkle.lib .\lib64\
          copy .\winsparkle\Release\WinSparkle.dll .\output\Win32\
          copy .\winsparkle\Release\WinSparkle.lib .\lib\

      - name: Setup prebuilt Rime + installer files
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path ..\rime-frost
          Set-Content -Path ..\rime-frost\essay.txt -Value "placeholder"
          Set-Content -Path ..\rime-frost\default.yaml -Value "placeholder"
          $upstream = "https://raw.githubusercontent.com/rime/weasel/master/output"
          Invoke-WebRequest -Uri "$upstream/7z.exe" -OutFile ".\output\7z.exe"
          Invoke-WebRequest -Uri "$upstream/7-zip-license.txt" -OutFile ".\output\7-zip-license.txt"
          Invoke-WebRequest -Uri "$upstream/curl.exe" -OutFile ".\output\curl.exe"
          Invoke-WebRequest -Uri "$upstream/COPYING-curl.txt" -OutFile ".\output\COPYING-curl.txt"
          "" | Out-File -FilePath ".\output\rime-install.bat" -Encoding ascii
          "" | Out-File -FilePath ".\output\rime-install-config.bat" -Encoding ascii
          "" | Out-File -FilePath ".\output\start_service.bat" -Encoding ascii
          "" | Out-File -FilePath ".\output\stop_service.bat" -Encoding ascii

      - name: Build data
        shell: pwsh
        run: .\build.bat data

      - name: Build Weasel
        id: build_weasel
        shell: pwsh
        env:
          RELEASE_BUILD: ${{ (github.repository == 'rime/weasel' && startsWith(github.ref, 'refs/tags/')) && '1' || '' }}
        run: .\build.bat arm64 installer

      - name: Compress Debug Symbols
        shell: pwsh
        run: output\7z.exe a -t7z "./output/archives/debug_symbols.7z" "output/*.pdb" -r

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: weasel-artifact-${{ env.git_ref_name }}
          if-no-files-found: error
          path: |
            .\output\archives\weasel*.exe
            .\output\archives\debug_symbols.7z

      - name: Extract changelog
        if: ${{ github.repository == 'rime/weasel' && startsWith(github.ref, 'refs/tags/') }}
        shell: pwsh
        run: .\extract_changelog.ps1

      - name: Create Nightly release
        if: ${{ github.repository == 'rime/weasel' && github.ref == 'refs/heads/master' }}
        uses: 'marvinpinto/action-automatic-releases@latest'
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          automatic_release_tag: latest
          prerelease: true
          title: "Nightly Build"
          files: |
            ./output/archives/weasel*.exe
            ./output/archives/debug_symbols.7z

      - name: Release (stable)
        if: ${{ github.repository == 'rime/weasel' && startsWith(github.ref, 'refs/tags/') }}
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            ./output/archives/weasel*.exe
            ./output/archives/debug_symbols.7z
          body_path: ${{ github.workspace }}/RELEASE_CHANGELOG.md
